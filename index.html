<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股息記錄器 Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: var(--text-primary);
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
    }
    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    input, select, textarea {
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.2s;
      background: var(--card-bg);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
    }
    .btn-secondary {
      background: var(--background);
      color: var(--text-primary);
      border: 2px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--primary);
    }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .stat-card {
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid #bae6fd;
    }
    .stat-card.green {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-color: #86efac;
    }
    .stat-card.purple {
      background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
      border-color: #d8b4fe;
    }
    .stat-card h3 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: bold;
      color: var(--primary);
    }
    .stat-card.green .value { color: var(--secondary); }
    .stat-card.purple .value { color: #9333ea; }
    .chart-container {
      position: relative;
      height: 300px;
      margin-top: 20px;
    }
    .filter-section {
      background: var(--background);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .filter-row {
      display: flex;
      gap: 15px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .table-container {
      overflow-x: auto;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: var(--primary);
      color: white;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    tr:hover {
      background: #f8fafc;
    }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 5px;
    }
    .tag-dividend { background: #dcfce7; color: #166534; }
    .tag-potential { background: #fef3c7; color: #92400e; }
    .tag-stable { background: #dbeafe; color: #1e40af; }
    .actions {
      display: flex;
      gap: 8px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 18px;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 Pro 股息記錄器</h1>
      <p class="subtitle">專業級配息追蹤分析系統</p>
    </header>

    <div class="grid">
      <!-- 輸入卡片 -->
      <div class="card">
        <h2>➕ 新增配息紀錄</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="stockName">股票名稱/代碼</label>
            <input type="text" id="stockName" placeholder="2330 台積電">
          </div>
          <div class="form-group">
            <label for="category">分類</label>
            <select id="category">
              <option value="stable">💎 穩定配息</option>
              <option value="dividend">💰 高股息</option>
              <option value="potential">🚀 潛力股</option>
            </select>
          </div>
          <div class="form-group">
            <label for="divDate">配息日期</label>
            <input type="date" id="divDate">
          </div>
          <div class="form-group">
            <label for="divAmount">配息金額 (NT$)</label>
            <input type="number" id="divAmount" placeholder="0.00" step="0.01">
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
          <label for="remarks">備註</label>
          <input type="text" id="remarks" placeholder="選填">
        </div>
        <button class="btn btn-primary" onclick="addDividend()">
          <span>✅</span> 加入配息紀錄
        </button>
      </div>

      <!-- 統計卡片 -->
      <div class="card">
        <h2>📊 配息分析</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <h3>總配息金額</h3>
            <div class="value" id="totalAmount">NT$ 0.00</div>
          </div>
          <div class="stat-card green">
            <h3>紀錄筆數</h3>
            <div class="value" id="totalCount">0</div>
          </div>
          <div class="stat-card purple">
            <h3>平均單筆</h3>
            <div class="value" id="avgAmount">NT$ 0.00</div>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>

    <!-- 篩選區 -->
    <div class="filter-section">
      <div class="filter-row">
        <div class="form-group">
          <label for="startDate">開始日期</label>
          <input type="date" id="startDate">
        </div>
        <div class="form-group">
          <label for="endDate">結束日期</label>
          <input type="date" id="endDate">
        </div>
        <div class="form-group">
          <label for="filterStock">股票篩選</label>
          <select id="filterStock"><option value="">全部股票</option></select>
        </div>
        <div class="form-group">
          <label for="searchInput">搜尋</label>
          <input type="text" id="searchInput" placeholder="輸入股票名稱...">
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" onclick="applyFilter()">🔍 篩選</button>
          <button class="btn btn-secondary" onclick="clearFilter()">🔄 重置</button>
          <button class="btn btn-secondary" onclick="exportCSV()">📥 匯出 CSV</button>
          <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📤 匯入 CSV</button>
          <input type="file" id="fileInput" style="display: none;" accept=".csv" onchange="importCSV(event)">
          <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清除所有數據</button>
        </div>
      </div>
    </div>

    <!-- 詳細表格 -->
    <div class="table-container">
      <table id="dataTable">
        <thead>
          <tr>
            <th>配息日期</th>
            <th>股票名稱</th>
            <th>分類</th>
            <th>配息金額</th>
            <th>備註</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty-state">📭 尚未有配息紀錄，加入第一筆吧！</div>
    </div>
  </div>

  <script>
    let dividends = JSON.parse(localStorage.getItem('dividendRecords')) || [];
    let chartInstance = null;
    
    function init() {
      renderTable();
      updateTotals();
      updateStockFilter();
      initChart();
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value = today;
      
      // 搜尋即時更新
      document.getElementById('searchInput').addEventListener('input', applyFilter);
    }

    function addDividend() {
      const stockName = document.getElementById('stockName').value.trim();
      const divDate = document.getElementById('divDate').value;
      const divAmount = parseFloat(document.getElementById('divAmount').value);
      const category = document.getElementById('category').value;
      const remarks = document.getElementById('remarks').value.trim();

      if (!stockName || !divDate || isNaN(divAmount) || divAmount <= 0) {
        alert('請完整填妥必要資訊！');
        return;
      }

      const record = {
        id: Date.now(),
        stockName,
        category,
        divDate,
        divAmount,
        remarks,
        createdAt: new Date().toISOString()
      };

      dividends.push(record);
      saveData();
      
      document.getElementById('stockName').value = '';
      document.getElementById('divAmount').value = '';
      document.getElementById('remarks').value = '';
      document.getElementById('divDate').value = '';
      
      renderTable();
      updateTotals();
      updateStockFilter();
      updateChart();
      
      alert('✅ 配息紀錄已加入！');
    }

    function deleteRecord(id) {
      if (!confirm('確定刪除此筆紀錄嗎？')) return;
      dividends = dividends.filter(d => d.id !== id);
      saveData();
      renderTable();
      updateTotals();
      updateStockFilter();
      updateChart();
    }

    function saveData() {
      localStorage.setItem('dividendRecords', JSON.stringify(dividends));
    }

    function renderTable() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const filterStock = document.getElementById('filterStock').value;
      const searchInput = document.getElementById('searchInput').value.toLowerCase();

      let filtered = [...dividends];
      
      if (startDate) filtered = filtered.filter(d => d.divDate >= startDate);
      if (endDate) filtered = filtered.filter(d => d.divDate <= endDate);
      if (filterStock) filtered = filtered.filter(d => d.stockName === filterStock);
      if (searchInput) filtered = filtered.filter(d => 
        d.stockName.toLowerCase().includes(searchInput) ||
        (d.remarks && d.remarks.toLowerCase().includes(searchInput))
      );

      filtered.sort((a, b) => new Date(b.divDate) - new Date(a.divDate));

      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      tbody.innerHTML = filtered.map(d => `
        <tr>
          <td>${formatDate(d.divDate)}</td>
          <td><strong>${escapeHtml(d.stockName)}</strong></td>
          <td><span class="tag tag-${d.category}">${getCategoryName(d.category)}</span></td>
          <td style="color: var(--secondary); font-weight: bold;">NT$ ${d.divAmount.toFixed(2)}</td>
          <td>${escapeHtml(d.remarks || '-')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-danger" style="padding: 6px 12px; font-size: 13px;" onclick="deleteRecord(${d.id})">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function updateTotals() {
      const filtered = getFilteredDividends();
      const total = filtered.reduce((sum, d) => sum + d.divAmount, 0);
      const count = filtered.length;
      const avg = count > 0 ? total / count : 0;

      document.getElementById('totalAmount').textContent = `NT$ ${total.toFixed(2)}`;
      document.getElementById('totalCount').textContent = count;
      document.getElementById('avgAmount').textContent = `NT$ ${avg.toFixed(2)}`;
    }

    function getFilteredDividends() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const filterStock = document.getElementById('filterStock').value;
      const searchInput = document.getElementById('searchInput').value.toLowerCase();

      let filtered = [...dividends];
      
      if (startDate) filtered = filtered.filter(d => d.divDate >= startDate);
      if (endDate) filtered = filtered.filter(d => d.divDate <= endDate);
      if (filterStock) filtered = filtered.filter(d => d.stockName === filterStock);
      if (searchInput) filtered = filtered.filter(d => 
        d.stockName.toLowerCase().includes(searchInput) ||
        (d.remarks && d.remarks.toLowerCase().includes(searchInput))
      );
      
      return filtered;
    }

    function updateStockFilter() {
      const select = document.getElementById('filterStock');
      const stocks = [...new Set(dividends.map(d => d.stockName))].sort();
      
      select.innerHTML = '<option value="">全部股票</option>' +
        stocks.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
    }

    function applyFilter() { renderTable(); updateTotals(); }

    function clearFilter() {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      document.getElementById('filterStock').value = '';
      document.getElementById('searchInput').value = '';
      renderTable();
      updateTotals();
    }

    function clearAllData() {
      if (!confirm('警告：此操作將刪除所有數據！確定嗎？')) return;
      localStorage.removeItem('dividendRecords');
      dividends = [];
      renderTable();
      updateTotals();
      updateStockFilter();
      updateChart();
      alert('✅ 所有數據已清除');
    }

    function getCategoryName(category) {
      const names = {
        stable: '💎 穩定配息',
        dividend: '💰 高股息',
        potential: '🚀 潛力股'
      };
      return names[category] || category;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function initChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: [],
          datasets: [{
            label: '配息金額',
            data: [],
            backgroundColor: '#6366f1',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: { beginAtZero: true, grid: { color: '#e2e8f0' } },
            x: { grid: { display: false } }
          }
        }
      });
      updateChart();
    }

    function updateChart() {
      const filtered = getFilteredDividends();
      const byMonth = {};
      
      filtered.forEach(d => {
        const month = d.divDate.substring(0, 7);
        byMonth[month] = (byMonth[month] || 0) + d.divAmount;
      });

      const labels = Object.keys(byMonth).sort();
      const data = labels.map(m => byMonth[m]);

      chartInstance.data.labels = labels;
      chartInstance.data.datasets[0].data = data;
      chartInstance.update();
    }

    function exportCSV() {
      const filtered = getFilteredDividends();
      if (filtered.length === 0) {
        alert('沒有可匯出的資料');
        return;
      }

      const headers = ['配息日期', '股票名稱', '分類', '配息金額', '備註'];
      const rows = filtered.map(d => [
        d.divDate,
        d.stockName,
        getCategoryName(d.category),
        d.divAmount,
        d.remarks || ''
      ]);

      let csv = headers.join(',') + '\n';
      rows.forEach(row => {
        csv += row.map(cell => `"${cell}"`).join(',') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `dividend_${new Date().toISOString().split('T')[0]}.csv`;
      link.click();
    }

    function importCSV(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.trim().split('\n');
        const records = [];
        
        lines.slice(1).forEach((line, index) => {
          const [divDate, stockName, category, divAmount, remarks] = line.split(',').map(s => s.replace(/"/g, '').trim());
          if (divDate && stockName && divAmount) {
            records.push({
              id: Date.now() + index,
              stockName,
              category: getCategoryByShort(category),
              divDate,
              divAmount: parseFloat(divAmount),
              remarks,
              createdAt: new Date().toISOString()
            });
          }
        });

        if (records.length === 0) {
          alert('無法讀取 CSV 資料');
          return;
        }

        dividends = [...dividends, ...records];
        saveData();
        renderTable();
        updateTotals();
        updateStockFilter();
        updateChart();
        
        alert(`✅ 已匯入 ${records.length} 筆紀錄！`);
      };
      reader.readAsText(file);
    }

    function getCategoryByShort(category) {
      if (typeof category === 'string') {
        if (category.includes('穩定')) return 'stable';
        if (category.includes('高股')) return 'dividend';
        if (category.includes('潛力')) return 'potential';
      }
      return 'stable';
    }

    init();
  </script>
</body>
</html>
